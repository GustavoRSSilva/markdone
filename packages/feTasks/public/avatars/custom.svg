<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-custom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#636e72"/>
      <stop offset="100%" style="stop-color:#2d3436"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg-custom)"/>

  <!-- Dashed ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Plus icon -->
  <rect x="46" y="28" width="8" height="44" rx="4" fill="white" opacity="0.9"/>
  <rect x="28" y="46" width="44" height="8" rx="4" fill="white" opacity="0.9"/>

  <!-- Sparkles -->
  <circle cx="22" cy="22" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="78" cy="22" r="2" fill="white" opacity="0.4"/>
  <circle cx="78" cy="78" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="22" cy="78" r="2" fill="white" opacity="0.4"/>
</svg>
