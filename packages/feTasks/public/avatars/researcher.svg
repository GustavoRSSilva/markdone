<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="clip-researcher">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
    <linearGradient id="bg-researcher" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#1a56db"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg-researcher)"/>

  <!-- Hair (dark brown) -->
  <ellipse cx="50" cy="28" rx="20" ry="14" fill="#3b2314"/>
  <rect x="30" y="28" width="40" height="10" fill="#3b2314"/>

  <!-- Face -->
  <ellipse cx="50" cy="44" rx="18" ry="20" fill="#f5cba7"/>

  <!-- Ears -->
  <ellipse cx="32" cy="44" rx="4" ry="5.5" fill="#f5cba7"/>
  <ellipse cx="68" cy="44" rx="4" ry="5.5" fill="#f5cba7"/>

  <!-- Glasses frame -->
  <rect x="35" y="39" width="11" height="8" rx="3" fill="none" stroke="#333" stroke-width="1.8"/>
  <rect x="53" y="39" width="11" height="8" rx="3" fill="none" stroke="#333" stroke-width="1.8"/>
  <line x1="46" y1="43" x2="53" y2="43" stroke="#333" stroke-width="1.5"/>
  <line x1="32" y1="43" x2="35" y2="43" stroke="#333" stroke-width="1.5"/>
  <line x1="64" y1="43" x2="68" y2="43" stroke="#333" stroke-width="1.5"/>

  <!-- Eyes -->
  <circle cx="40.5" cy="43" r="2" fill="#333"/>
  <circle cx="58.5" cy="43" r="2" fill="#333"/>

  <!-- Smile -->
  <path d="M 43 53 Q 50 59 57 53" stroke="#c68642" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Body / shirt (teal) -->
  <ellipse cx="50" cy="83" rx="22" ry="14" fill="#1fa88a"/>
  <rect x="28" y="75" width="44" height="14" rx="4" fill="#1fa88a" clip-path="url(#clip-researcher)"/>

  <!-- Magnifying glass (lower right) -->
  <circle cx="66" cy="76" r="7" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="71" y1="81" x2="76" y2="86" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
